name: API Lint
on:
  push:
    branches:
      - openu
    paths:
      - 'apps/api/**'
  pull_request:
    paths:
      - 'apps/api/**'
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ruff lint
        uses: chartboost/ruff-action@v1
        with:
          src: './apps/api'
