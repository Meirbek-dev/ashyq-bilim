name: App Build
on:
  push:
    branches:
      - openu
    paths:
      - '**'
  pull_request:
    paths:
      - '**'
jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t openu .
        working-directory: .
