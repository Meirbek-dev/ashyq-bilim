name: Web Lint

on:
  push:
    branches:
      - openu
    paths:
      - 'apps/web/**'
  pull_request:
    paths:
      - 'apps/web/**'
jobs:
  next-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install dependencies
        run: bun install --no-frozen-lockfile
        working-directory: ./apps/web
      - name: Run Lint
        run: bun run lint
        working-directory: ./apps/web
