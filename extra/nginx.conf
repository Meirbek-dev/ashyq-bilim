# Proxy cache zone (http-context level — conf.d files are included inside the http block)
proxy_cache_path /var/cache/nginx/app
  levels=1:2
  keys_zone=app_cache:10m
  max_size=1g
  inactive=60m
  use_temp_path=off;

server {
  listen 80;
  server_name cs-mooc.tou.edu.kz;
  client_max_body_size 500M;

  # Increase header buffer size
  large_client_header_buffers 4 32k;

  # Increase the maximum allowed size of the client request body
  client_body_buffer_size 32k;

  # Increase the maximum allowed size of the client request header fields
  client_header_buffer_size 32k;

  # Proxy buffers for better performance
  proxy_buffer_size 128k;
  proxy_buffers 4 256k;
  proxy_busy_buffers_size 256k;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Next.js static files (_next/static) — content-addressed, safe to cache permanently
  location /_next/static {
    proxy_pass http://app:8000;
    proxy_cache app_cache;
    proxy_cache_valid 200 365d;
    proxy_cache_bypass $http_cache_control;
    add_header Cache-Control "public, max-age=31536000, immutable";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Next.js image optimization endpoint — transformation endpoint, not immutable
  location /_next/image {
    proxy_pass http://app:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # NextJS Revalidation
  location /api/revalidate {
    proxy_pass http://app:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Next Auth
  location /api/auth {
    proxy_pass http://app:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Python Backend API
  location /api/v1 {
    proxy_pass http://app:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Backend Static Content
  location /content {
    proxy_pass http://app:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # FastAPI Docs (only available in development mode)
  location /api/v1/docs {
    proxy_pass http://app:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # FastAPI ReDoc (only available in development mode)
  location /api/v1/redoc {
    proxy_pass http://app:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Frontend
  location / {
    proxy_pass http://app:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

