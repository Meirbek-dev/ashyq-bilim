services:
  proxy:
    image: nginx:1.29.5-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./extra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx/app
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MEDIA_URL: ${NEXT_PUBLIC_MEDIA_URL}
    restart: unless-stopped
    expose:
      - "8000"
      - "9000"
    volumes:
      # Mount only the content directory to persist user uploads and org data
      - app_content:/app/api/content
      # Mount logs directory to persist application logs
      - app_logs:/app/api/logs
    env_file:
      - ./extra/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
  db:
    image: postgres:18.2-trixie
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=openu
      - POSTGRES_PASSWORD=openu
      - POSTGRES_DB=openu
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openu"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - docker-volume-backup.stop-during-backup=true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
  redis:
    image: redis:8.6.0-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      - docker-volume-backup.stop-during-backup=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
  chromadb:
    image: chromadb/chroma:1.5.0
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    labels:
      - docker-volume-backup.stop-during-backup=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 256M

  # Judge0 - code runner for coding activities
  judge0_server:
    image: judge0/judge0:1.13.1
    command: ["bash", "-c", "sudo mkdir -p /box && sudo chmod 1777 /box && exec ./scripts/server"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - judge0_box:/box
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - docker-volume-backup.stop-during-backup=true
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=db

  judge0_workers:
    image: judge0/judge0:1.13.1
    command: ["bash", "-c", "sudo mkdir -p /box && sudo chmod 1777 /box && exec ./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - judge0_box:/box
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    privileged: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - docker-volume-backup.stop-during-backup=true
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=db

  backup:
    image: offen/docker-volume-backup:v2.47.0
    restart: unless-stopped
    env_file:
      - ./extra/backup.env
    volumes:
      # Database volumes
      - postgres_data:/backup/postgres:ro
      - redis_data:/backup/redis:ro
      - chromadb_data:/backup/chromadb:ro
      # Application data volumes
      - app_content:/backup/app_content:ro
      - app_logs:/backup/app_logs:ro
      - judge0_box:/backup/judge0_box:ro
      # Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Local backup storage
      - ./backups:/archive

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  app_content:
  app_logs:
  judge0_box:
  nginx_cache:
