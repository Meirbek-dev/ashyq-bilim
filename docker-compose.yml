# Usage:
#   docker-compose up -d                              # start everything
#   docker-compose run --rm migrate                   # run migrations (manual)

networks:
  app-net: {}
  data-net: {}
  exec-net:
    internal: true

services:

  # ---------------------------------------------------------------------------
  # Edge
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.29.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
    volumes:
      - ./extra/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx/app
    networks:
      - app-net
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # Frontend — Next.js standalone server
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000/}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:1338/api/v1/}
        NEXT_PUBLIC_MEDIA_URL: ${NEXT_PUBLIC_MEDIA_URL:-http://localhost:1338/}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      INTERNAL_API_URL: http://api:8000/api/v1/
    env_file: .env
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # Backend — FastAPI
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - app_content:/app/content
    env_file: .env
    networks:
      - app-net
      - data-net
      - exec-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  # ---------------------------------------------------------------------------
  # Database migration — run manually, never auto-started
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: ./apps/api
    command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]
    env_file: .env
    networks:
      - data-net
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  db:
    build:
      context: .
      dockerfile: extra/Dockerfile.db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-openu}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openu}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - docker-volume-backup.stop-during-backup=true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"

  # ---------------------------------------------------------------------------
  # Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8.8-m03-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      - docker-volume-backup.stop-during-backup=true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # Code execution tier
  # ---------------------------------------------------------------------------
  judge0-server:
    image: judge0/judge0:1.13.1
    command: ["bash", "-c", "sudo mkdir -p /box && sudo chmod 1777 /box && exec ./scripts/server"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - judge0_box:/box
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    expose:
      - "2358"
    privileged: true
    restart: unless-stopped
    networks:
      - exec-net
      - data-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
    labels:
      - docker-volume-backup.stop-during-backup=true

  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ["bash", "-c", "sudo mkdir -p /box && sudo chmod 1777 /box && exec ./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - judge0_box:/box
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    privileged: true
    restart: unless-stopped
    networks:
      - exec-net
      - data-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
    labels:
      - docker-volume-backup.stop-during-backup=true

  # ---------------------------------------------------------------------------
  # Backup
  # ---------------------------------------------------------------------------
  backup:
    image: offen/docker-volume-backup:v2.47.0
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"
      BACKUP_RETENTION_DAYS: "7"
      BACKUP_COMPRESSION: zst
      BACKUP_FILENAME: "backup-%Y-%m-%dT%H-%M-%S.{{ .Extension }}"
      BACKUP_PRUNING_PREFIX: backup-
    volumes:
      - postgres_data:/backup/postgres:ro
      - redis_data:/backup/redis:ro
      - app_content:/backup/app_content:ro
      - judge0_box:/backup/judge0_box:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./backups:/archive

volumes:
  postgres_data:
  redis_data:
  app_content:
  judge0_box:
  nginx_cache:
